services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: nextcloud
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=63.32.56.42
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    restart: unless-stopped

  detector:
    build: ./detector
    container_name: detector
    ports:
      - "9000:9000"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:

